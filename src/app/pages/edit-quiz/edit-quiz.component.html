<div class="flex flex-col gap-8 animate-in fade-in duration-500">

  <!-- Header -->
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-4">
      <a routerLink="/home" class="flex items-center gap-2 text-slate-400 hover:text-[#00289d] transition-colors font-bold text-sm">
        <lucide-icon [img]="icons.ArrowLeft" class="w-4 h-4"></lucide-icon>
        Back
      </a>
      <h1 class="text-3xl font-black text-[#00289d]">Edit Quiz</h1>
    </div>
    <button (click)="saveQuiz()" [disabled]="isSaving"
      class="btn bg-[#2d55fb] hover:bg-blue-700 text-white border-none rounded-xl px-8 h-12 normal-case flex items-center gap-2 disabled:opacity-60">
      <lucide-icon [img]="icons.Save" class="w-5 h-5"></lucide-icon>
      {{ isSaving ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 rounded-2xl px-6 py-4 font-medium">
    {{ errorMessage }}
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="flex justify-center items-center py-24">
    <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
  </div>

  <ng-container *ngIf="!isLoading">
    <!-- General Info -->
    <div class="bg-white rounded-[2rem] p-8 shadow-sm flex flex-col gap-6">
      <h2 class="text-xl font-bold text-[#00289d] mb-4">General Information</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="font-bold text-slate-700 ml-2">Quiz Title</label>
          <input type="text" [(ngModel)]="quiz.title" placeholder="e.g. History of Rome"
            class="input w-full bg-[#f8faff] border-none rounded-xl pl-6 h-14 shadow-sm focus:ring-2 focus:ring-blue-100" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-bold text-slate-700 ml-2">Category</label>
          <select [(ngModel)]="quiz.category"
            class="select w-full bg-[#f8faff] border-none rounded-xl pl-6 h-14 shadow-sm focus:ring-2 focus:ring-blue-100 text-slate-500 font-normal">
            <option value="" disabled>Select a category</option>
            <option value="history">History</option>
            <option value="science">Science</option>
            <option value="geography">Geography</option>
            <option value="technology">Technology</option>
            <option value="sports">Sports</option>
            <option value="entertainment">Entertainment</option>
          </select>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="font-bold text-slate-700 ml-2">Description</label>
          <textarea [(ngModel)]="quiz.description" placeholder="Short description of the quiz..."
            class="textarea w-full bg-[#f8faff] border-none rounded-xl p-6 shadow-sm focus:ring-2 focus:ring-blue-100 min-h-[120px]"></textarea>
        </div>

        <div class="flex items-center gap-4">
          <label class="font-bold text-slate-700 ml-2">Visibility</label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" [(ngModel)]="quiz.isPublic" class="toggle toggle-primary" />
            <span class="text-sm font-medium text-slate-500">{{ quiz.isPublic ? 'Public' : 'Private' }}</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Questions -->
    <div class="flex flex-col gap-6">
      <div class="flex justify-between items-center">
        <h2 class="text-2xl font-black text-[#00289d]">Questions</h2>
        <button (click)="addQuestion()" class="btn bg-blue-100 hover:bg-blue-200 text-blue-600 border-none rounded-xl px-6 h-10 normal-case flex items-center gap-2">
          <lucide-icon [img]="icons.Plus" class="w-4 h-4"></lucide-icon>
          Add Question
        </button>
      </div>

      <div *ngFor="let q of questions; let i = index" class="bg-white rounded-[2rem] p-8 shadow-sm flex flex-col gap-6 relative group">
        <button (click)="removeQuestion(i)" *ngIf="questions.length > 1"
          class="absolute top-8 right-8 text-slate-300 hover:text-red-500 transition-colors">
          <lucide-icon [img]="icons.Trash2" class="w-5 h-5"></lucide-icon>
        </button>

        <div class="flex flex-col gap-2 pr-12">
          <label class="font-bold text-slate-700 ml-2">Question {{ i + 1 }}</label>
          <input type="text" [(ngModel)]="q.text" placeholder="Enter your question"
            class="input w-full bg-[#f8faff] border-none rounded-xl pl-6 h-14 shadow-sm focus:ring-2 focus:ring-blue-100" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div *ngFor="let opt of q.options; let j = index; trackBy: trackByIndex"
            class="flex items-center gap-3 bg-[#f8faff] p-2 pr-4 rounded-xl shadow-sm focus-within:ring-2 focus-within:ring-blue-100">
            <input type="radio" [name]="'correctOption_' + i" [value]="j" [(ngModel)]="q.correctOption"
              class="radio radio-primary ml-4" />
            <input type="text" [(ngModel)]="q.options[j]" placeholder="Option {{ j + 1 }}"
              class="input w-full bg-transparent border-none outline-none focus:outline-none focus:ring-0 shadow-none h-10" />
          </div>
        </div>
      </div>
    </div>
  </ng-container>

</div>
